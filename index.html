<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScamCheck MY - Anti-Scam Malaysia</title>
<!-- PWA Meta -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<!-- Icon Library -->
<script src="https://www.google.com/search?q=https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/lucide.min.js"></script>
<style>
:root {
--bg: #0f172a;
--card: #1e293b;
--primary: #3b82f6;
--success: #22c55e;
--danger: #ef4444;
--text: #f8fafc;
--muted: #94a3b8;
}
body {
font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
background: var(--bg);
color: var(--text);
margin: 0;
padding: 0;
display: flex;
justify-content: center;
min-height: 100vh;
}
.container {
width: 100%;
max-width: 450px;
padding: 24px;
box-sizing: border-box;
}
.app-header {
text-align: center;
margin-bottom: 32px;
}
.app-logo {
width: 110px;
height: 110px;
border-radius: 28px;
box-shadow: 0 10px 25px rgba(0,0,0,0.4);
margin-bottom: 16px;
border: 2px solid #334155;
background: #1e293b;
object-fit: cover;
}
h1 { font-size: 26px; margin: 0; font-weight: 800; letter-spacing: -0.5px; }
h1 span { color: #facc15; }
.badge {
display: inline-flex;
align-items: center;
gap: 6px;
background: rgba(59, 130, 246, 0.1);
color: var(--primary);
padding: 6px 14px;
border-radius: 30px;
font-size: 12px;
font-weight: 700;
margin-top: 10px;
border: 1px solid rgba(59, 130, 246, 0.2);
}
.card {
background: var(--card);
padding: 24px;
border-radius: 24px;
margin-bottom: 20px;
border: 1px solid #334155;
box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
}
h3 { margin: 0 0 16px 0; font-size: 18px; display: flex; align-items: center; gap: 10px; }
input, textarea {
width: 100%;
padding: 14px 16px;
margin-bottom: 12px;
background: #0f172a;
border: 1px solid #334155;
border-radius: 14px;
color: #fff;
box-sizing: border-box;
font-size: 16px;
}
button {
width: 100%;
padding: 16px;
background: var(--primary);
color: #fff;
border: none;
border-radius: 14px;
font-weight: 700;
font-size: 16px;
cursor: pointer;
}
#result {
margin-top: 16px;
padding: 16px;
border-radius: 14px;
text-align: center;
font-weight: 800;
display: none;
}
.feed-item {
border-bottom: 1px solid #334155;
padding: 16px 0;
}
.feed-num { color: var(--primary); font-weight: 700; }
.feed-msg { font-size: 14px; color: var(--muted); }
</style>
</head>
<body>
<div class="container">
<div class="app-header">
<img src="icon.png" class="app-logo" alt="Logo">
<h1>ScamCheck <span>MY</span></h1>
<div class="badge">
<i data-lucide="shield-check" size="14"></i> KOMUNITI LINDUNG KOMUNITI
</div>
</div>
<div class="card">
<h3><i data-lucide="search" size="20"></i> Semakan Nombor</h3>
<input type="tel" id="sNum" placeholder="Masukkan nombor telefon...">
<button onclick="check()">Semak Sekarang</button>
<div id="result"></div>
</div>
<div class="card">
<h3><i data-lucide="megaphone" size="20"></i> Lapor Scammer</h3>
<input type="tel" id="rNum" placeholder="Nombor telefon scammer">
<textarea id="rMsg" placeholder="Sebab laporan..." rows="2"></textarea>
<button onclick="report()" style="background:#1e40af;">Hantar Laporan</button>
</div>
<div class="card">
<h3><i data-lucide="history" size="20"></i> Laporan Terkini</h3>
<div id="feed">Memuatkan maklumat...</div>
</div>
</div>
<script>
lucide.createIcons();
let db = JSON.parse(localStorage.getItem('scam_reports_v1')) || [
{num: '0123456789', msg: 'Scam pelaburan kripto', date: '15/05/2024'},
{num: '0198765432', msg: 'Menyamar pihak bank', date: '14/05/2024'}
];
function check() {
const val = document.getElementById('sNum').value.replace(/\D/g,'');
const res = document.getElementById('result');
if(!val) return;
res.style.display = 'block';
const found = db.filter(i => i.num.replace(/\D/g,'').includes(val));
if(found.length > 0) {
res.style.background = 'rgba(239, 68, 68, 0.1)';
res.style.color = 'var(--danger)';
res.innerHTML = "⚠️ REKOD SCAM DITEMUI!";
} else {
res.style.background = 'rgba(34, 197, 94, 0.1)';
res.style.color = 'var(--success)';
res.innerHTML = "✅ TIADA REKOD.";
}
}
function report() {
const n = document.getElementById('rNum').value;
const m = document.getElementById('rMsg').value;
if(!n || !m) return alert("Isi maklumat!");
db.unshift({ num: n, msg: m, date: new Date().toLocaleDateString('ms-MY') });
localStorage.setItem('scam_reports_v1', JSON.stringify(db));
alert("Laporan dihantar!");
renderFeed();
}
function renderFeed() {
const feed = document.getElementById('feed');
feed.innerHTML = db.slice(0, 5).map(i => &lt;div class=&quot;feed-item&quot;&gt; &lt;div class=&quot;feed-num&quot;&gt;${i.num}&lt;/div&gt; &lt;div class=&quot;feed-msg&quot;&gt;${i.msg}&lt;/div&gt; &lt;/div&gt;).join('') || "Tiada laporan.";
}
renderFeed();
</script>
</body>
</html>

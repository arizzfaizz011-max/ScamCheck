<body>

<div class="container">
    <div class="app-header">
        <img src="2EA58EB5-1F9A-4109-B55E-103311109FF1.png" class="app-logo" alt="Logo ScamCheck">
        <h1>ScamCheck <span>MY</span></h1>
        <div class="badge">
            <i data-lucide="shield-check" size="16"></i> KOMUNITI LINDUNG KOMUNITI
        </div>
    </div>

    <div class="card">
        <h3><i data-lucide="search" size="22" color="#3b82f6"></i> Semakan Nombor</h3>
        <input type="tel" id="sNum" placeholder="Contoh: 0123456789">
        <button onclick="check()">Semak Sekarang</button>
        <div id="result"></div>
    </div>

    <div class="card">
        <h3><i data-lucide="megaphone" size="22" color="#ef4444"></i> Lapor Scammer</h3>
        <input type="tel" id="rNum" placeholder="Nombor telefon scammer">
        <textarea id="rMsg" placeholder="Apa taktik penipuan mereka?" rows="2"></textarea>
        <button onclick="report()" style="background:#1e40af;">Hantar Laporan</button>
    </div>

    <div class="card">
        <h3><i data-lucide="history" size="22" color="#22c55e"></i> Laporan Terkini</h3>
        <div id="feed">Memuatkan laporan...</div>
    </div>
</div>

<script>
    // Inisialisasi ikon Lucide
    lucide.createIcons();

    // Database sementara (Local Storage)
    let db = JSON.parse(localStorage.getItem('scam_reports_v2')) || [
        {num: '012XXXX789', msg: 'Scam tawaran kerja TikTok'},
        {num: '019XXXX432', msg: 'Menyamar pegawai LHDN'}
    ];

    function check() {
        const val = document.getElementById('sNum').value.replace(/\D/g,'');
        const res = document.getElementById('result');
        if(!val) return;
        
        res.style.display = 'block';
        const found = db.filter(i => i.num.replace(/\D/g,'').includes(val));
        
        if(found.length > 0) {
            res.style.background = 'rgba(239, 68, 68, 0.15)';
            res.style.color = 'var(--danger)';
            res.innerHTML = "⚠️ REKOD SCAM DITEMUI DALAM KOMUNITI!";
        } else {
            res.style.background = 'rgba(34, 197, 94, 0.15)';
            res.style.color = 'var(--success)';
            res.innerHTML = "✅ TIADA REKOD SCAM LAGI.";
        }
    }

    function report() {
        const n = document.getElementById('rNum').value.trim();
        const m = document.getElementById('rMsg').value.trim();
        
        if(!n || !m) {
            alert("Sila isi nombor dan sebab laporan!");
            return;
        }
        
        db.unshift({ num: n, msg: m });
        localStorage.setItem('scam_reports_v2', JSON.stringify(db));
        
        alert("Terima kasih! Laporan anda membantu orang lain.");
        document.getElementById('rNum').value = '';
        document.getElementById('rMsg').value = '';
        renderFeed();
    }

    function renderFeed() {
        const feed = document.getElementById('feed');
        if (db.length === 0) {
            feed.innerHTML = "<p style='color:var(--muted); font-size:14px;'>Tiada laporan baru.</p>";
            return;
        }
        feed.innerHTML = db.slice(0, 5).map(i => `
            <div class="feed-item">
                <div class="feed-num">${i.num}</div>
                <div class="feed-msg">${i.msg}</div>
            </div>
        `).join('');
    }

    // Jalankan feed pada permulaan
    renderFeed();

    // Daftar Service Worker untuk fungsi Offline (PWA)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('SW Registered'))
                .catch(err => console.log('SW Error', err));
        });
    }
</script>
</body>
</html>

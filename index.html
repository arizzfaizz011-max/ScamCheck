```html
<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScamCheck MY - Anti-Scam Malaysia</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/lucide.min.js"></script>

<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --primary: #3b82f6;
  --success: #22c55e;
  --danger: #ef4444;
  --text: #f8fafc;
}

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
  display: flex;
  justify-content: center;
  min-height: 100vh;
}

.container {
  width: 100%;
  max-width: 450px;
  padding: 24px;
  box-sizing: border-box;
}

.app-header {
  text-align: center;
  margin-bottom: 30px;
}

.app-logo {
  width: 120px;
  height: 120px;
  border-radius: 28px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  margin-bottom: 16px;
  border: 2px solid #334155;
  object-fit: cover;
}

h1 { font-size: 26px; margin: 0; font-weight: 800; }
h1 span { color: #facc15; }

.card {
  background: var(--card);
  padding: 24px;
  border-radius: 20px;
  margin-bottom: 20px;
  border: 1px solid #334155;
}

input, textarea {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  background: #0f172a;
  border: 1px solid #334155;
  border-radius: 12px;
  color: #fff;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 16px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  margin-top: 15px;
  cursor: pointer;
}

#result {
  margin-top: 16px;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
  font-weight: bold;
  display: none;
}
</style>
</head>
<body>

<div class="container">
  <div class="app-header">
    <!-- KOD DI BAWAH SUDAH GUNA NAMA FAIL PANJANG GAMBAR ANDA -->
    <img src="2EA58EB5-1F9A-4109-B55E-103311109FF1.png" class="app-logo" alt="Logo">
    <h1>ScamCheck <span>MY</span></h1>
  </div>

  <div class="card">
    <h3>Semakan Nombor</h3>
    <input type="tel" id="sNum" placeholder="Masukkan nombor telefon...">
    <button onclick="check()">Semak Sekarang</button>
    <div id="result"></div>
  </div>

  <div class="card">
    <h3>Lapor Scammer</h3>
    <input type="tel" id="rNum" placeholder="Nombor telefon scammer">
    <textarea id="rMsg" placeholder="Sebab laporan..." rows="2"></textarea>
    <button onclick="report()" style="background:#1e40af;">Hantar Laporan</button>
  </div>
</div>

<script>
lucide.createIcons();

let db = JSON.parse(localStorage.getItem('scam_db')) || [];

function check() {
  const val = document.getElementById('sNum').value.replace(/\D/g,'');
  const res = document.getElementById('result');
  if(!val) return;
  res.style.display = 'block';
  const found = db.filter(i => i.num.replace(/\D/g,'').includes(val));
  if(found.length > 0) {
    res.style.background = 'rgba(239, 68, 68, 0.2)';
    res.style.color = 'var(--danger)';
    res.innerHTML = "⚠️ REKOD SCAM DITEMUI!";
  } else {
    res.style.background = 'rgba(34, 197, 94, 0.2)';
    res.style.color = 'var(--success)';
    res.innerHTML = "✅ TIADA REKOD.";
  }
}

function report() {
  const n = document.getElementById('rNum').value;
  const m = document.getElementById('rMsg').value;
  if(!n || !m) return alert("Isi maklumat!");
  db.unshift({ num: n, msg: m });
  localStorage.setItem('scam_db', JSON.stringify(db));
  alert("Laporan berjaya!");
}
</script>
</body>
</html>

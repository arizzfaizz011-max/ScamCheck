<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScamCheck MY - Anti-Scam Malaysia</title>
<!-- PWA Meta Tags -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<link rel="apple-touch-icon" href="icon.png">
<!-- Font & Icon -->
<script src="https://www.google.com/search?q=https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/lucide.min.js"></script>
<style>
:root {
--bg: #0f172a;
--card: #1e293b;
--primary: #3b82f6;
--success: #22c55e;
--danger: #ef4444;
--text: #f8fafc;
}
body {
font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
background: var(--bg);
color: var(--text);
margin: 0;
display: flex;
justify-content: center;
min-height: 100vh;
}
.container {
width: 100%;
max-width: 480px;
padding: 20px;
box-sizing: border-box;
}
.app-header {
text-align: center;
margin-bottom: 30px;
}
.app-logo {
width: 120px;
height: 120px;
border-radius: 24px;
box-shadow: 0 10px 30px rgba(0,0,0,0.5);
margin-bottom: 15px;
border: 2px solid #334155;
}
h1 { font-size: 28px; margin: 0; letter-spacing: -0.5px; }
.dev-badge {
display: inline-flex;
align-items: center;
gap: 5px;
background: rgba(59, 130, 246, 0.1);
color: var(--primary);
padding: 4px 12px;
border-radius: 20px;
font-size: 12px;
font-weight: 600;
margin-top: 8px;
}
.card {
background: var(--card);
padding: 24px;
border-radius: 20px;
margin-bottom: 20px;
border: 1px solid #334155;
}
h3 { margin-top: 0; font-size: 18px; display: flex; align-items: center; gap: 10px; }
input, textarea {
width: 100%;
padding: 14px;
margin-top: 10px;
background: #0f172a;
border: 1px solid #334155;
border-radius: 12px;
color: #fff;
box-sizing: border-box;
font-size: 16px;
}
button {
width: 100%;
padding: 16px;
background: var(--primary);
color: #fff;
border: none;
border-radius: 12px;
font-weight: bold;
font-size: 16px;
margin-top: 15px;
cursor: pointer;
}
#result {
margin-top: 20px;
padding: 15px;
border-radius: 12px;
text-align: center;
font-weight: bold;
display: none;
}
.report-item {
border-bottom: 1px solid #334155;
padding: 15px 0;
}
.num-txt { color: var(--primary); font-weight: bold; font-size: 17px; }
.date-txt { color: #64748b; font-size: 11px; display: block; margin-top: 4px; }
</style>
</head>
<body>
<div class="container">
<div class="app-header">
<img src="icon.png" class="app-logo" alt="ScamCheck MY Logo">
<h1>ScamCheck <span style="color:#facc15;">MY</span></h1>
<div class="dev-badge">
<i data-lucide="shield-check" size="14"></i> VERIFIED BY BAB
</div>
</div>
<div class="card">
<h3><i data-lucide="search"></i> Semakan Pintar</h3>
<input type="tel" id="sNum" placeholder="Masukkan nombor telefon...">
<button onclick="check()">Semak Sekarang</button>
<div id="result"></div>
</div>
<div class="card">
<h3><i data-lucide="alert-triangle"></i> Lapor Kes Scam</h3>
<input type="tel" id="rNum" placeholder="Nombor scammer">
<textarea id="rMsg" placeholder="Sebab laporan..." rows="2"></textarea>
<button onclick="report()" style="background:#1e40af;">Hantar Laporan</button>
</div>
<div class="card">
<h3><i data-lucide="list"></i> Laporan Komuniti</h3>
<div id="feed">Memuatkan data...</div>
</div>
</div>
<script>
lucide.createIcons();
if ('serviceWorker' in navigator) {
window.addEventListener('load', () => {
navigator.serviceWorker.register('sw.js').catch(()=>{});
});
}
let db = JSON.parse(localStorage.getItem('scam_v4')) || [];
function check() {
const val = document.getElementById('sNum').value.replace(/\D/g,'');
const res = document.getElementById('result');
if(!val) return;
res.style.display = 'block';
const found = db.filter(i => i.num.replace(/\D/g,'') === val);
if(found.length > 0) {
res.style.background = 'rgba(239, 68, 68, 0.15)';
res.style.color = 'var(--danger)';
res.innerHTML = "⚠️ REKOD DITEMUI!";
} else {
res.style.background = 'rgba(34, 197, 94, 0.15)';
res.style.color = 'var(--success)';
res.innerHTML = "✅ TIADA REKOD.";
}
}
function report() {
const n = document.getElementById('rNum').value;
const m = document.getElementById('rMsg').value;
if(!n || !m) return alert("Sila isi info.");
db.push({ num: n, msg: m, date: new Date().toLocaleDateString('ms-MY') });
localStorage.setItem('scam_v4', JSON.stringify(db));
alert("Berjaya!");
render();
}
function render() {
const f = document.getElementById('feed');
f.innerHTML = db.slice().reverse().map(i => &lt;div class=&quot;report-item&quot;&gt; &lt;span class=&quot;num-txt&quot;&gt;${i.num}&lt;/span&gt; &lt;p style=&quot;margin:5px 0; font-size:14px;&quot;&gt;${i.msg}&lt;/p&gt; &lt;span class=&quot;date-txt&quot;&gt;${i.date}&lt;/span&gt; &lt;/div&gt;).join('') || "Tiada laporan.";
}
render();
</script>
</body>
</html>
